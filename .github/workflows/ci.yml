name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  clang-tidy:
    name: clang-tidy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install clang-tidy
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-tidy

      - name: Run clang-tidy
        run: make clang-tidy

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    env:
      HAS_CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcovr lcov

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.0'

      - name: Install Ceedling
        run: gem install ceedling -v 1.0.1

      - name: Run tests and coverage
        run: make coverage

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: |
            build/ceedling/artifacts/gcov/gcovr/GcovCoverageResults.html
            build/ceedling/artifacts/gcov/gcovr/coverage.txt
            build/coverage/coverage.xml
          if-no-files-found: warn

      - name: Upload coverage to Codecov
        if: env.HAS_CODECOV_TOKEN == 'true'
        uses: codecov/codecov-action@v6
        with:
          files: build/coverage/coverage.xml
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true

      - name: Skip Codecov upload
        if: env.HAS_CODECOV_TOKEN != 'true'
        run: echo "Skipping Codecov upload because CODECOV_TOKEN is not configured."
